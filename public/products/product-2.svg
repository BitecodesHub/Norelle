<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE3D5"/>
      <stop offset="100%" style="stop-color:#F5EDE0"/>
    </linearGradient>
    <linearGradient id="bottle2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C2018"/>
      <stop offset="40%" style="stop-color:#3D2E20"/>
      <stop offset="100%" style="stop-color:#1C1008"/>
    </linearGradient>
    <linearGradient id="cap2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#E4C97A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg2)"/>
  <!-- Round bottle body -->
  <ellipse cx="200" cy="290" rx="70" ry="90" fill="url(#bottle2)"/>
  <!-- Neck -->
  <rect x="183" y="168" width="34" height="50" rx="8" fill="#2C2018"/>
  <!-- Cap gold -->
  <rect x="175" y="135" width="50" height="40" rx="12" fill="url(#cap2)"/>
  <!-- Label on dark bottle -->
  <rect x="155" y="250" width="90" height="80" rx="5" fill="rgba(245,237,224,0.12)" stroke="rgba(212,175,55,0.6)" stroke-width="1"/>
  <text x="200" y="278" font-family="Georgia,serif" font-size="12" fill="#E8DCCB" text-anchor="middle" letter-spacing="3">NORELLE</text>
  <line x1="165" y1="285" x2="235" y2="285" stroke="#D4AF37" stroke-width="0.8"/>
  <text x="200" y="299" font-family="Georgia,serif" font-size="8" fill="#D4AF37" text-anchor="middle" letter-spacing="2">VELVET MUSK</text>
  <text x="200" y="314" font-family="Georgia,serif" font-size="7.5" fill="#B09278" text-anchor="middle">Attar · 25ml</text>
  <!-- Shine on dark bottle -->
  <ellipse cx="168" cy="270" rx="8" ry="30" fill="rgba(255,255,255,0.08)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="392" rx="60" ry="7" fill="rgba(28,16,8,0.12)"/>
</svg>
