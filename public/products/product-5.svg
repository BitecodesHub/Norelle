<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAF7"/>
      <stop offset="100%" style="stop-color:#F5EDE0"/>
    </linearGradient>
    <linearGradient id="bottle5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D8B8C0"/>
      <stop offset="50%" style="stop-color:#EDD0D8"/>
      <stop offset="100%" style="stop-color:#C8A8B0"/>
    </linearGradient>
    <linearGradient id="cap5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8960C"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#E4C97A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg5)"/>
  <!-- Curved bottle body -->
  <path d="M155,375 Q148,280 165,210 Q175,185 200,180 Q225,185 235,210 Q252,280 245,375 Z" fill="url(#bottle5)" stroke="#D8B8C0" stroke-width="1"/>
  <!-- Neck -->
  <rect x="184" y="148" width="32" height="40" rx="7" fill="#DDB8C0"/>
  <!-- Spray pump cap -->
  <rect x="177" y="118" width="46" height="36" rx="10" fill="url(#cap5)"/>
  <!-- Spray nozzle -->
  <rect x="220" y="128" width="18" height="6" rx="3" fill="#D4AF37"/>
  <!-- Label -->
  <rect x="162" y="228" width="76" height="100" rx="6" fill="rgba(255,255,255,0.6)" stroke="rgba(212,175,55,0.4)" stroke-width="0.8"/>
  <text x="200" y="254" font-family="Georgia,serif" font-size="11" fill="#1C1008" text-anchor="middle" letter-spacing="3">NORELLE</text>
  <line x1="172" y1="261" x2="228" y2="261" stroke="#D4AF37" stroke-width="0.7"/>
  <text x="200" y="275" font-family="Georgia,serif" font-size="8" fill="#7A5E47" text-anchor="middle" letter-spacing="2">SAKURA BLISS</text>
  <text x="200" y="290" font-family="Georgia,serif" font-size="7.5" fill="#B09278" text-anchor="middle">Eau de Parfum</text>
  <text x="200" y="303" font-family="Georgia,serif" font-size="7" fill="#B09278" text-anchor="middle">75ml</text>
  <!-- Shine -->
  <path d="M162,220 Q158,280 162,330" stroke="rgba(255,255,255,0.4)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="388" rx="52" ry="7" fill="rgba(180,120,120,0.1)"/>
</svg>
