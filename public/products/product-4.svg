<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5EDE0"/>
      <stop offset="100%" style="stop-color:#EDE3D5"/>
    </linearGradient>
    <linearGradient id="bottle4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5E3C"/>
      <stop offset="40%" style="stop-color:#A8784E"/>
      <stop offset="100%" style="stop-color:#7A5230"/>
    </linearGradient>
    <linearGradient id="cap4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#E4C97A"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg4)"/>
  <!-- Square bottle body -->
  <rect x="148" y="175" width="104" height="195" rx="12" fill="url(#bottle4)"/>
  <!-- Neck -->
  <rect x="178" y="143" width="44" height="40" rx="8" fill="#9C7B5A"/>
  <!-- Cap -->
  <rect x="170" y="112" width="60" height="38" rx="10" fill="url(#cap4)"/>
  <!-- Label area -->
  <rect x="158" y="215" width="84" height="110" rx="5" fill="rgba(245,237,224,0.18)" stroke="rgba(212,175,55,0.7)" stroke-width="1.2"/>
  <!-- Gold ornament -->
  <text x="200" y="238" font-family="Georgia,serif" font-size="8" fill="#D4AF37" text-anchor="middle">✦</text>
  <text x="200" y="255" font-family="Georgia,serif" font-size="12" fill="#F5EDE0" text-anchor="middle" letter-spacing="3">NORELLE</text>
  <line x1="168" y1="262" x2="232" y2="262" stroke="#D4AF37" stroke-width="0.8"/>
  <text x="200" y="277" font-family="Georgia,serif" font-size="8.5" fill="#D4AF37" text-anchor="middle" letter-spacing="2">AMBER WOOD</text>
  <text x="200" y="292" font-family="Georgia,serif" font-size="7.5" fill="#C4A882" text-anchor="middle">Attar · 30ml</text>
  <text x="200" y="308" font-family="Georgia,serif" font-size="7" fill="#C4A882" text-anchor="middle">Pure Concentration</text>
  <!-- Shine -->
  <rect x="155" y="182" width="10" height="90" rx="5" fill="rgba(255,255,255,0.12)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="384" rx="55" ry="7" fill="rgba(100,60,20,0.1)"/>
</svg>
