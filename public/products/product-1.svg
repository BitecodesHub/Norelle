<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="#F5EDE0"/>
  <rect x="0" y="0" width="400" height="500" fill="url(#bg-grad)"/>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5EDE0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EDE3D5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bottle-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8D9C0;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#F5EDE0;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#EDE3D5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D8C9B0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cap-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8A870;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B8960C;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Bottle body -->
  <rect x="145" y="180" width="110" height="200" rx="18" fill="url(#bottle-grad)" stroke="#D4AF37" stroke-width="1.5"/>
  <!-- Bottle neck -->
  <rect x="175" y="145" width="50" height="45" rx="8" fill="url(#bottle-grad)" stroke="#D4AF37" stroke-width="1.2"/>
  <!-- Cap -->
  <rect x="168" y="115" width="64" height="38" rx="10" fill="url(#cap-grad)"/>
  <!-- Label -->
  <rect x="158" y="215" width="84" height="100" rx="6" fill="rgba(255,255,255,0.6)" stroke="#D4AF37" stroke-width="0.8"/>
  <!-- Label text -->
  <text x="200" y="248" font-family="Georgia,serif" font-size="13" fill="#1C1008" text-anchor="middle" letter-spacing="3">NORELLE</text>
  <line x1="168" y1="256" x2="232" y2="256" stroke="#D4AF37" stroke-width="0.8"/>
  <text x="200" y="272" font-family="Georgia,serif" font-size="9" fill="#7A5E47" text-anchor="middle" letter-spacing="2">ROSE OUD</text>
  <text x="200" y="288" font-family="Georgia,serif" font-size="8" fill="#B09278" text-anchor="middle">Eau de Parfum · 50ml</text>
  <!-- Shine -->
  <rect x="152" y="185" width="12" height="80" rx="6" fill="rgba(255,255,255,0.35)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="395" rx="55" ry="8" fill="rgba(140,90,40,0.1)"/>
</svg>
