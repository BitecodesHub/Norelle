<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE3D5"/>
      <stop offset="100%" style="stop-color:#E8DCCB"/>
    </linearGradient>
    <linearGradient id="bottle6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A2A1A"/>
      <stop offset="40%" style="stop-color:#263826"/>
      <stop offset="100%" style="stop-color:#141C14"/>
    </linearGradient>
    <linearGradient id="cap6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8960C"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg6)"/>
  <!-- Hexagonal / faceted bottle body -->
  <polygon points="200,168 248,195 248,360 200,385 152,360 152,195" fill="url(#bottle6)"/>
  <!-- Neck -->
  <rect x="183" y="138" width="34" height="38" rx="7" fill="#263826"/>
  <!-- Cap -->
  <rect x="176" y="108" width="48" height="36" rx="10" fill="url(#cap6)"/>
  <!-- Facet highlight -->
  <polygon points="200,168 248,195 248,280 200,305" fill="rgba(255,255,255,0.06)"/>
  <!-- Label -->
  <rect x="160" y="220" width="80" height="105" rx="5" fill="rgba(245,237,224,0.14)" stroke="rgba(212,175,55,0.65)" stroke-width="1"/>
  <!-- Decorative corners -->
  <line x1="162" y1="222" x2="170" y2="222" stroke="#D4AF37" stroke-width="1.2"/>
  <line x1="162" y1="222" x2="162" y2="230" stroke="#D4AF37" stroke-width="1.2"/>
  <line x1="238" y1="222" x2="230" y2="222" stroke="#D4AF37" stroke-width="1.2"/>
  <line x1="238" y1="222" x2="238" y2="230" stroke="#D4AF37" stroke-width="1.2"/>
  <line x1="162" y1="323" x2="170" y2="323" stroke="#D4AF37" stroke-width="1.2"/>
  <line x1="162" y1="323" x2="162" y2="315" stroke="#D4AF37" stroke-width="1.2"/>
  <line x1="238" y1="323" x2="230" y2="323" stroke="#D4AF37" stroke-width="1.2"/>
  <line x1="238" y1="323" x2="238" y2="315" stroke="#D4AF37" stroke-width="1.2"/>
  <text x="200" y="250" font-family="Georgia,serif" font-size="11" fill="#F5EDE0" text-anchor="middle" letter-spacing="3">NORELLE</text>
  <line x1="170" y1="258" x2="230" y2="258" stroke="#D4AF37" stroke-width="0.7"/>
  <text x="200" y="273" font-family="Georgia,serif" font-size="8" fill="#D4AF37" text-anchor="middle" letter-spacing="2">MYSTIC OUD</text>
  <text x="200" y="289" font-family="Georgia,serif" font-size="7.5" fill="#C4A882" text-anchor="middle">Attar · 15ml</text>
  <text x="200" y="304" font-family="Georgia,serif" font-size="7" fill="#C4A882" text-anchor="middle">Concentrated Perfume</text>
  <!-- Shadow -->
  <ellipse cx="200" cy="396" rx="52" ry="7" fill="rgba(26,42,26,0.12)"/>
</svg>
